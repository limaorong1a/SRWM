dify:
  base_url: "https://api-bj.clink.cn"
  access_key_id: "${DIFY_ACCESS_KEY_ID}"
  access_key_secret: "${DIFY_ACCESS_KEY_SECRET}"
  agent_id: "${DIFY_ALFWORLD_AGENT_ID}"
  user: "alfworld-sft-collector"

alfworld:
  data_root: "${ALFWORLD_DATA}"
  split: "train"
  base_config: "base_config.yaml"

collection:
  quota_per_type:
    pick_and_place_simple: 200
    look_at_obj_in_light: 200
    pick_clean_then_place_in_recep: 200
    pick_heat_then_place_in_recep: 200
    pick_cool_then_place_in_recep: 200
    pick_two_obj_and_place: 200
  min_quota_floor: 100
  max_retry_per_task: 3
  max_total_attempts_per_type: 800
  max_steps_per_episode: 50
  max_workers: 8

output:
  raw_dir: "rl/data/raw"
  sft_dir: "rl/data/sft"
  progress_file: "rl/data/raw/progress.json"
  quota_state_file: "rl/data/raw/quota_state.json"
  index_file: "rl/data/raw/index.jsonl"

